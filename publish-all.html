<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Publicar cursos</title>
<style>body{font-family:monospace;padding:2rem;background:#1a1a1a;color:#eee}
.ok{color:#4caf50}.err{color:#f44336}pre{white-space:pre-wrap}</style>
</head>
<body>
<h2>Publicando cursos y añadiendo clave...</h2>
<pre id="log"></pre>
<script>
const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjb2xsZWN0aW9uSWQiOiJwYmNfMzE0MjYzNTgyMyIsImV4cCI6MTc3NjE4NTI5MSwiaWQiOiJycXVwb2tnMWVyNTZ0MjUiLCJyZWZyZXNoYWJsZSI6ZmFsc2UsInR5cGUiOiJhdXRoIn0.dTtVoaOC8UGipqj1bkDfOv1Q2slKSNFGj8H96PczzUQ";
const BASE = "https://pocketbase.vmoliver.cloud";
const COLLECTION = "andreamoro_data";
const ADD_KEYS = ["andimoro32@gmail.com"];

const log = document.getElementById("log");
function print(msg, ok) {
  const span = document.createElement("span");
  span.className = ok === true ? "ok" : ok === false ? "err" : "";
  span.textContent = msg + "\n";
  log.appendChild(span);
}

(async () => {
  print("Obteniendo cursos...");
  const res = await fetch(`${BASE}/api/collections/${COLLECTION}/records?perPage=200`, {
    headers: { Authorization: TOKEN }
  });
  const { items } = await res.json();
  if (!items?.length) { print("Error: no se encontraron cursos.", false); return; }
  print(`${items.length} cursos encontrados.\n`);

  for (const course of items) {
    const existingKeys = course.json?.keys ?? [];
    const mergedKeys = [...new Set([...existingKeys, ...ADD_KEYS])];
    const updatedJson = { ...course.json, published: true, keys: mergedKeys };
    const patch = await fetch(`${BASE}/api/collections/${COLLECTION}/records/${course.id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Authorization: TOKEN },
      body: JSON.stringify({ json: updatedJson })
    });
    const result = await patch.json();
    const ok = result.json?.published === true;
    print(`${ok ? "✓" : "✗"} ${course.title} — claves: ${result.json?.keys?.join(", ")}`, ok);
  }
  print("\n¡Listo!");
})();
</script>
</body>
</html>
